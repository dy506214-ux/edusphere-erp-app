name: edusphere
description: EduSphere - Smart School ERP & Digital Learning System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_screenutil: ^5.9.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  file_picker: ^8.1.2
  pdf: ^3.11.0
  printing: ^5.13.0
  path_provider: ^2.1.2
  supabase_flutter: ^2.3.4
  socket_io_client: ^3.1.0
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/qr_payment.png
