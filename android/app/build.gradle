plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.edusphere.app"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11
    }

    defaultConfig {
        applicationId "com.edusphere.app"
        minSdk flutter.minSdkVersion
        targetSdk 36
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }

    lintOptions {
        checkReleaseBuilds false
        abortOnError false
    }
}

flutter {
    source "../.."
}

// Bypass AAR Metadata Check to prevent AGP compatibility errors with bleeding-edge dependencies
tasks.whenTaskAdded { task ->
    if (task.name.contains('CheckAarMetadata')) {
        task.enabled = false
    }
}

// Force compatible stable activity and ktx dependency versions
configurations.all {
    resolutionStrategy {
        force 'androidx.activity:activity:1.8.2'
        force 'androidx.activity:activity-ktx:1.8.2'
    }
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}
